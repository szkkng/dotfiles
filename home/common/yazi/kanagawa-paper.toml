# bg        "#1f1f28"
# bg2       "#2a2a37"
# bg3       "#363646"
# fg        "#dcd7ba"
# muted     "#727169"
# red       "#c4746e"
# yellow    "#c4b28a"
# green     "#699469"
# purple    "#938aa9"
# cyan      "#8ea49e"
# blue      "#658594"
# orange    "#b6927b"

[mgr]
marker_copied = { fg = "#699469", bg = "#699469" }
marker_cut = { fg = "#c4746e", bg = "#c4746e" }
marker_marked = { fg = "#938aa9", bg = "#938aa9" }
marker_selected = { fg = "#b6927b", bg = "#b6927b" }

cwd = { fg = "#c4b28a" }

find_keyword = { fg = "#b6927b", bg = "#1f1f28" }
find_position = {}

count_copied = { fg = "#1f1f28", bg = "#699469" }
count_cut = { fg = "#1f1f28", bg = "#c4746e" }
count_selected = { fg = "#1f1f28", bg = "#b6927b" }

border_symbol = "│"
border_style = { fg = "#dcd7ba" }

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { reversed = true }

[tabs]
active = { fg = "#1f1f28", bg = "#c4b28a" }
inactive = { fg = "#9e9b93", bg = "#2a2a37" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

[mode]
normal_main = { fg = "#1f1f28", bg = "#8ea49e" }
normal_alt = { fg = "#8ea49e", bg = "#2a2a37" }
select_main = { fg = "#1f1f28", bg = "#938aa9" }
select_alt = { fg = "#938aa9", bg = "#2a2a37" }
unset_main = { fg = "#1f1f28", bg = "#c4b28a" }
unset_alt = { fg = "#c4b28a", bg = "#2a2a37" }

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
overall = { fg = "#dcd7ba", bg = "#1f1f28" }

progress_label = { fg = "#8ea49e", bold = true }
progress_normal = { fg = "#363646", bg = "#1f1f28" }
progress_error = { fg = "#c4746e", bg = "#1f1f28" }

perm_type = { fg = "#699469" }
perm_read = { fg = "#c4b28a" }
perm_write = { fg = "#c4746e" }
perm_exec = { fg = "#8ea49e" }
perm_sep = { fg = "#938aa9" }

[pick]
border = { fg = "#8ea49e" }
active = { fg = "#938aa9", bold = true }
inactive = {}

[input]
border = { fg = "#8ea49e" }
title = {}
value = {}
selected = { reversed = true }

[completion]
border = { fg = "#8ea49e" }
active = { reversed = true }
inactive = {}

[tasks]
border = { fg = "#8ea49e" }
title = {}
hovered = { fg = "#938aa9" }

[which]
cols = 2
separator = " - "
separator_style = { fg = "#727169" }
mask = { bg = "#1f1f28" }
rest = { fg = "#727169" }
cand = { fg = "#8ea49e" }
desc = { fg = "#625e5a" }

[help]
on = { fg = "#8ea49e" }
run = { fg = "#938aa9" }
desc = {}
hovered = { reversed = true, bold = true }
footer = { fg = "#1f1f28", bg = "#dcd7ba" }

[notify]
title_info = { fg = "#699469" }
title_warn = { fg = "#c4b28a" }
title_error = { fg = "#c4746e" }

[filetype]
rules = [
    { mime = "image/*", fg = "#c4b28a" },
    { mime = "{audio,video}/*", fg = "#938aa9" },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#c4746e" },
    { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#8ea49e" },

    { url = "*", is = "orphan", fg = "#c4746e" },
    { url = "*", is = "exec", fg = "#699469" },

    { url = "*", fg = "#dcd7ba" },
    { url = "*/", fg = "#658594" },
]
